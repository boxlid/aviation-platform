# Sonic Flights — secrets template.
# Copy this file to  config/secrets.toml  and fill in real values.
# config/secrets.toml is gitignored and must NEVER be committed.

[database]
url = "postgresql:///aviation"

# Movement / ADS-B data
[adsbexchange]
rapidapi_key = ""          # RapidAPI key (ADS-B Exchange community/enterprise)

[flightaware]
aeroapi_key = ""           # FlightAware AeroAPI v4

[opensky]
client_id = ""
client_secret = ""

# Airport / FBO data (see deep-research output)
[aerodatabox]
rapidapi_key = ""

# Gmail OAuth uses secrets/gmail_credentials.json (added via the UI), not this file.

# Google Workspace domain-wide delegation (service account key at secrets/workspace_sa.json)
[workspace]
admin_email = ""   # a super-admin email to impersonate for listing users
domain = ""
