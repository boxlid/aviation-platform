{% extends "base.html" %}
{% block crumb %}OurAirports · global airports & runways{% endblock %}
{% block content %}
  <div class="toolbar">
    <input id="q" class="search" placeholder="Search name, city, IATA/ICAO…" autofocus />
    <input id="country" placeholder="Country (US, GB…)" style="width:150px" />
    <select id="minrwy">
      <option value="0">Any runway</option>
      <option value="3000">≥ 3,000 ft</option>
      <option value="5000" selected>≥ 5,000 ft (jet)</option>
      <option value="7000">≥ 7,000 ft</option>
      <option value="10000">≥ 10,000 ft</option>
    </select>
    <span id="count" class="muted"></span>
  </div>
  <div class="panel">
    <table class="sortable" id="tbl">
      <thead><tr>
        <th data-key="name" data-type="str">Airport</th>
        <th data-key="iata_code" data-type="str">IATA</th>
        <th data-key="ident" data-type="str">ICAO/Ident</th>
        <th data-key="municipality" data-type="str">City</th>
        <th data-key="iso_country" data-type="str">Country</th>
        <th data-key="longest_runway_ft" data-type="num" class="num">Longest runway</th>
        <th data-key="runway_count" data-type="num" class="num">Runways</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
{% endblock %}
{% block script %}<script>SF.airports();</script>{% endblock %}
