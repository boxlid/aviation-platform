{% extends "base.html" %}
{% block crumb %}Gmail ingestion · searchable email{% endblock %}
{% block content %}
  <div id="gmail-banner" style="margin-bottom:16px"></div>
  <div class="toolbar">
    <input id="q" class="search" placeholder="Search emails (subject, sender, body)…" autofocus />
    <span id="count" class="muted"></span>
  </div>
  <div class="panel">
    <table>
      <thead><tr><th style="width:260px">From</th><th>Subject</th><th>Received</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
{% endblock %}
{% block script %}<script>SF.emails();</script>{% endblock %}
