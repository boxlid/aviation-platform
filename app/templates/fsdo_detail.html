{% extends "base.html" %}
{% block crumb %}<a href="/operators" class="dim">Operators</a> · FSDO{% endblock %}
{% block heading %}<span id="fsdo-name">FSDO</span>{% endblock %}
{% block content %}
  <div id="fsdo-meta" class="grid cols-3"></div>

  <div class="section-title">Operators based at this FSDO <span class="line"></span></div>
  <div class="panel">
    <table class="sortable" id="tbl">
      <thead><tr>
        <th data-key="operator_name" data-type="str">Operator</th>
        <th data-key="fleet_size" data-type="num" class="num">Fleet</th>
        <th data-key="jets" data-type="num" class="num">Jets</th>
        <th data-key="turboprops" data-type="num" class="num">Turboprop</th>
        <th data-key="helicopters" data-type="num" class="num">Heli</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
{% endblock %}
{% block script %}<script>SF.fsdoDetail();</script>{% endblock %}
